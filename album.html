<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Album — Lumière Archive</title>
<meta name="description" content="A chapter from Lumière Archive." />
<meta name="theme-color" content="#0a0a0a" />
<meta property="og:type" content="article" />
<meta property="og:title" content="Lumière Archive" />
<meta property="og:description" content="A chapter from Lumière Archive." />
<meta name="twitter:card" content="summary_large_image" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a0a;
    --bg-soft: #121212;
    --fg: #e8e4dc;
    --fg-muted: #7a7468;
    --fg-dim: #3a3632;
    --accent: #b29267;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Inter', system-ui, sans-serif;
    font-weight: 300;
    line-height: 1.6;
    overflow-x: hidden;
  }

  ::selection { background: var(--accent); color: var(--bg); }
  a { color: inherit; text-decoration: none; }

  .label {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--fg-muted);
  }

  /* ——————————————— NAV ——————————————— */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 32px 48px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    mix-blend-mode: difference;
  }
  nav .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--fg);
    transition: opacity 0.3s;
  }
  nav .brand:hover { opacity: 0.6; }
  nav .meta {
    text-align: right;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--fg);
    line-height: 1.8;
  }
  .admin-toggle {
    display: inline-block;
    margin-top: 10px;
    background: transparent;
    border: 1px solid currentColor;
    color: inherit;
    padding: 5px 12px;
    font-family: inherit;
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    opacity: 0.55;
    transition: opacity 0.3s;
  }
  .admin-toggle:hover { opacity: 1; }

  /* ——————————————— ADMIN CONTROLS ——————————————— */
  .admin-only { display: none !important; }
  body.is-admin .admin-only { display: flex !important; }

  .photo .admin-delete {
    position: absolute;
    top: 12px; right: 12px;
    width: 34px; height: 34px;
    background: rgba(10,10,10,0.85);
    border: 1px solid rgba(255,255,255,0.2);
    color: var(--fg);
    cursor: pointer;
    z-index: 5;
    font-size: 13px;
    display: none;
    align-items: center;
    justify-content: center;
    transition: background 0.25s, border-color 0.25s;
  }
  body.is-admin .photo .admin-delete { display: flex; }
  .photo .admin-delete:hover {
    background: rgba(178,146,103,0.95);
    border-color: var(--accent);
  }

  .photo-upload {
    background: var(--bg-soft);
    border: 1px dashed var(--fg-dim);
    cursor: pointer;
    transition: border-color 0.3s;
    min-height: 320px;
  }
  .photo-upload:hover { border-color: var(--fg); }
  .photo-upload input { display: none; }
  .photo-upload label {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px;
    color: var(--fg-muted);
    cursor: pointer;
    transition: color 0.3s;
  }
  .photo-upload:hover label { color: var(--fg); }
  .photo-upload .plus {
    font-family: 'Cormorant Garamond', serif;
    font-size: 56px;
    font-weight: 300;
    line-height: 1;
  }
  .photo-upload .lbl {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }

  /* ——————————————— ADMIN PANEL ——————————————— */
  .admin-panel {
    max-width: 1400px;
    margin: 100px auto 0;
    padding: 28px 80px;
    border: 1px solid var(--fg-dim);
    background: rgba(18,18,18,0.4);
  }
  .admin-panel-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 40px;
    flex-wrap: wrap;
  }
  .admin-cover {
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .admin-cover-preview {
    width: 72px;
    height: 102px;
    background: var(--bg-soft);
    border: 1px solid var(--fg-dim);
    background-size: cover;
    background-position: center;
    flex-shrink: 0;
  }
  .admin-cover-preview.empty::after {
    content: '—';
    display: flex;
    width: 100%; height: 100%;
    align-items: center;
    justify-content: center;
    color: var(--fg-dim);
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
  }
  .admin-cover-meta {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .admin-cover-state {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    color: var(--fg);
  }
  .admin-panel-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .admin-action {
    background: transparent;
    border: 1px solid var(--fg-dim);
    color: var(--fg-muted);
    padding: 10px 18px;
    font-family: inherit;
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
  }
  .admin-action:hover {
    color: var(--fg);
    border-color: var(--fg);
  }
  .admin-action:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }
  .admin-action:disabled:hover {
    color: var(--fg-muted);
    border-color: var(--fg-dim);
  }
  body.is-admin .album-header { padding-top: 60px; }

  /* ——————————————— COVER CROP MODAL ——————————————— */
  .cover-modal {
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cover-modal[hidden] { display: none; }
  .cover-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(6,6,6,0.94);
  }
  .cover-stage {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    padding: 40px;
  }
  .stage-inner {
    position: relative;
    display: inline-block;
    line-height: 0;
  }
  .stage-img {
    display: block;
    max-width: 80vw;
    max-height: 70vh;
    user-select: none;
    -webkit-user-drag: none;
  }
  .crop-box {
    position: absolute;
    border: 2px solid var(--fg);
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.6);
    cursor: move;
    box-sizing: border-box;
    touch-action: none;
  }
  .crop-box .grid-line {
    position: absolute;
    background: rgba(255,255,255,0.28);
    pointer-events: none;
  }
  .crop-box .grid-line.v1 { left: 33.33%; top: 0; bottom: 0; width: 1px; }
  .crop-box .grid-line.v2 { left: 66.67%; top: 0; bottom: 0; width: 1px; }
  .crop-box .grid-line.h1 { top: 33.33%; left: 0; right: 0; height: 1px; }
  .crop-box .grid-line.h2 { top: 66.67%; left: 0; right: 0; height: 1px; }
  .stage-hint {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--fg-muted);
  }
  .stage-actions { display: flex; gap: 14px; }
  .btn-ghost, .btn-primary {
    background: transparent;
    border: 1px solid var(--fg-dim);
    color: var(--fg-muted);
    padding: 12px 28px;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
  }
  .btn-primary { color: var(--fg); border-color: var(--fg); }
  .btn-ghost:hover { color: var(--fg); border-color: var(--fg); }
  .btn-primary:hover { background: var(--fg); color: var(--bg); }

  @media (max-width: 900px) {
    .admin-panel { padding: 20px 24px; margin-top: 80px; }
    .admin-panel-row { flex-direction: column; align-items: flex-start; gap: 20px; }
  }

  /* ——————————————— ALBUM HEADER ——————————————— */
  .album-header {
    padding: 200px 80px 120px;
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1.4fr;
    gap: 80px;
    align-items: end;
  }
  .album-header .chapter {
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--fg-muted);
    margin-bottom: 32px;
  }
  .album-header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 104px;
    line-height: 0.95;
    letter-spacing: -0.01em;
  }
  .album-header .desc {
    color: var(--fg-muted);
    font-size: 15px;
    line-height: 1.75;
    max-width: 440px;
  }

  /* ——————————————— GALLERY (masonry via CSS columns) ——————————————— */
  .gallery {
    padding: 40px 80px 160px;
    max-width: 1400px;
    margin: 0 auto;
    columns: 3;
    column-gap: 24px;
  }
  .photo {
    position: relative;
    display: block;
    width: 100%;
    margin: 0 0 24px;
    break-inside: avoid;
    overflow: hidden;
    background: var(--bg-soft);
  }
  .photo img {
    width: 100%;
    height: auto;
    display: block;
    transition: transform 1.4s cubic-bezier(0.22, 1, 0.36, 1),
                filter 0.6s;
    filter: brightness(0.9);
  }
  .photo:hover img {
    transform: scale(1.03);
    filter: brightness(1);
  }
  .photo .caption {
    position: absolute;
    bottom: 20px; left: 20px;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--fg);
    opacity: 0;
    transition: opacity 0.4s;
  }
  .photo:hover .caption { opacity: 1; }

  @media (max-width: 1100px) { .gallery { columns: 2; } }
  @media (max-width: 650px)  { .gallery { columns: 1; } }

  /* ——————————————— FOOTER NAV ——————————————— */
  .album-footer {
    border-top: 1px solid var(--fg-dim);
    padding: 60px 80px;
    max-width: 1400px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    align-items: center;
    gap: 24px;
  }
  .album-footer a {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--fg-muted);
    transition: color 0.3s;
  }
  .album-footer a:hover { color: var(--fg); }
  .album-footer .prev { justify-self: start; }
  .album-footer .home { justify-self: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    letter-spacing: 0.2em;
  }
  .album-footer .next { justify-self: end; }
  .album-footer .dir {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
  }
  .album-footer .sub {
    display: block;
    font-size: 9px;
    color: var(--fg-dim);
    margin-top: 4px;
  }
  .album-footer .peek {
    display: flex; flex-direction: column;
  }

  footer.site {
    border-top: 1px solid var(--fg-dim);
    padding: 40px 80px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--fg-muted);
  }
  footer.site a {
    color: var(--fg-muted);
    margin-left: 32px;
    transition: color 0.3s;
  }
  footer.site a:hover { color: var(--fg); }

  /* entrance animation */
  .fade-up { opacity: 0; transform: translateY(24px); transition: opacity 1s ease, transform 1s ease; }
  .fade-up.in { opacity: 1; transform: translateY(0); }

  /* ACCESSIBILITY */
  *:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }

  /* IMAGE BROKEN FALLBACK */
  .photo.img-broken {
    aspect-ratio: 4/3;
    position: relative;
  }
  .photo.img-broken::after {
    content: '—';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--fg-dim);
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
  }

  /* LIGHTBOX */
  .lightbox {
    position: fixed;
    inset: 0;
    z-index: 2000;
    background: rgba(0,0,0,0.97);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s ease;
  }
  .lightbox.open {
    opacity: 1;
    visibility: visible;
  }
  .lightbox-img {
    max-width: 92vw;
    max-height: 88vh;
    object-fit: contain;
    user-select: none;
    -webkit-user-drag: none;
    box-shadow: 0 30px 80px -20px rgba(0,0,0,0.9);
  }
  .lightbox-caption {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--fg-muted);
    text-align: center;
  }
  .lightbox-counter {
    position: absolute;
    top: 28px;
    left: 32px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    letter-spacing: 0.2em;
    color: var(--fg-muted);
  }
  .lightbox-btn {
    position: absolute;
    background: transparent;
    border: 1px solid var(--fg-dim);
    color: var(--fg);
    width: 48px;
    height: 48px;
    cursor: pointer;
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.3s, background 0.3s;
  }
  .lightbox-btn:hover {
    border-color: var(--fg);
    background: rgba(255,255,255,0.05);
  }
  .lightbox-close { top: 24px; right: 24px; }
  .lightbox-prev  { left: 24px; top: 50%; transform: translateY(-50%); }
  .lightbox-next  { right: 24px; top: 50%; transform: translateY(-50%); }

  @media (max-width: 700px) {
    .lightbox-prev, .lightbox-next { width: 40px; height: 40px; }
    .lightbox-prev { left: 12px; }
    .lightbox-next { right: 12px; }
    .lightbox-close { top: 16px; right: 16px; }
    .lightbox-counter { top: 18px; left: 18px; font-size: 12px; }
  }

  .photo { cursor: zoom-in; }

  @media (max-width: 900px) {
    nav { padding: 20px 24px; }
    .album-header { padding: 140px 24px 60px; grid-template-columns: 1fr; gap: 24px; }
    .album-header h1 { font-size: 56px; }
    .gallery { padding: 20px 24px 80px; }
    .gallery .photo { grid-column: span 12 !important; aspect-ratio: 4/3 !important; }
    .album-footer { padding: 40px 24px; grid-template-columns: 1fr; text-align: center; }
    .album-footer .prev, .album-footer .home, .album-footer .next { justify-self: center; }
    footer.site { flex-direction: column; gap: 16px; padding: 24px; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="brand">Lumière Archive</a>
  <div class="meta">
    Album <span id="navIdx">01</span> / <span id="navTotal">09</span><br />
    <span id="navChapter">Chapter One</span>
    <button class="admin-toggle" id="adminToggle" style="display:none">Log in</button>
  </div>
</nav>

<div class="admin-panel admin-only" id="adminPanel">
  <div class="admin-panel-row">
    <div class="admin-cover">
      <div class="admin-cover-preview empty" id="coverPreview"></div>
      <div class="admin-cover-meta">
        <span class="label">Cover Image</span>
        <span class="admin-cover-state" id="coverState">Default</span>
      </div>
    </div>
    <div class="admin-panel-actions">
      <input type="file" id="coverInput" accept="image/*" hidden />
      <button class="admin-action" id="coverBtn">Change cover</button>
      <button class="admin-action" id="coverClearBtn" disabled>Remove cover</button>
      <button class="admin-action" id="resetBtn">Reset photos</button>
    </div>
  </div>
</div>

<header class="album-header fade-up">
  <div>
    <div class="chapter" id="chapterLabel">Chapter One</div>
    <h1 id="albumTitle">—</h1>
  </div>
  <p class="desc" id="albumDesc">—</p>
</header>

<section class="gallery" id="gallery"></section>

<div class="album-footer">
  <a id="prevLink" class="prev">
    <span class="dir">←</span>
    <span class="peek">
      <span>Previous</span>
      <span class="sub" id="prevTitle">—</span>
    </span>
  </a>
  <a href="index.html" class="home">Return to Archive</a>
  <a id="nextLink" class="next">
    <span class="peek">
      <span>Next</span>
      <span class="sub" id="nextTitle">—</span>
    </span>
    <span class="dir">→</span>
  </a>
</div>

<div class="cover-modal" id="coverModal" hidden>
  <div class="cover-backdrop"></div>
  <div class="cover-stage">
    <div class="stage-inner">
      <img class="stage-img" alt="" />
      <div class="crop-box">
        <div class="grid-line v1"></div>
        <div class="grid-line v2"></div>
        <div class="grid-line h1"></div>
        <div class="grid-line h2"></div>
      </div>
    </div>
    <div class="stage-hint">Drag the box to choose your cover · Card ratio 220 × 310</div>
    <div class="stage-actions">
      <button class="btn-ghost" id="coverCancel">Cancel</button>
      <button class="btn-primary" id="coverConfirm">Set as cover</button>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer" hidden>
  <button class="lightbox-btn lightbox-close" id="lbClose" aria-label="Close (Esc)">✕</button>
  <button class="lightbox-btn lightbox-prev"  id="lbPrev"  aria-label="Previous (←)">‹</button>
  <button class="lightbox-btn lightbox-next"  id="lbNext"  aria-label="Next (→)">›</button>
  <span class="lightbox-counter" id="lbCounter"></span>
  <img class="lightbox-img" id="lbImg" alt="" />
  <div class="lightbox-caption" id="lbCaption"></div>
</div>

<footer class="site">
  <div>© MMXXVI — Lumière Archive</div>
  <div>
    <a href="https://instagram.com/" target="_blank" rel="noopener" aria-label="Instagram">Instagram</a>
    <a href="mailto:abcysl@gmail.com" aria-label="Email">Email</a>
  </div>
</footer>

<script src="albums.js"></script>
<script src="admin.js"></script>
<script>
  Admin.mountAuthButton();

  const params = new URLSearchParams(location.search);
  const albums = window.ALBUMS || [];
  const total = albums.length;
  let id = parseInt(params.get('id') || '0', 10);
  if (isNaN(id) || id < 0 || id >= total) id = 0;

  const album = albums[id];
  const prev = (id - 1 + total) % total;
  const next = (id + 1) % total;

  const pad = (n) => String(n + 1).padStart(2, '0');
  document.getElementById('navIdx').textContent = pad(id);
  document.getElementById('navTotal').textContent = String(total).padStart(2, '0');
  document.getElementById('navChapter').textContent = album.chapter || '';
  document.getElementById('chapterLabel').textContent = album.chapter || '';
  document.getElementById('albumTitle').textContent = album.title;
  document.getElementById('albumDesc').textContent = album.description || '';
  document.title = `${album.title} — Lumière Archive`;

  document.getElementById('prevLink').href = `album.html?id=${prev}`;
  document.getElementById('nextLink').href = `album.html?id=${next}`;
  document.getElementById('prevTitle').textContent = albums[prev].title;
  document.getElementById('nextTitle').textContent = albums[next].title;

  // ——————————————— GALLERY (masonry, admin-aware) ———————————————
  const gallery = document.getElementById('gallery');

  function renderGallery() {
    gallery.innerHTML = '';
    const photos = Admin.getAlbumPhotos(id);

    photos.forEach(([src, caption], i) => {
      const div = document.createElement('div');
      div.className = 'photo fade-up';
      div.dataset.idx = String(i);
      const safeCaption = (caption || album.title || 'Untitled').replace(/"/g, '&quot;');
      div.innerHTML = `
        <img src="${src}" alt="${safeCaption}" loading="lazy" decoding="async"
             onerror="this.style.display='none';this.parentElement.classList.add('img-broken')" />
        <span class="caption">${caption || ''}</span>
        <button class="admin-delete" data-idx="${i}" title="Delete photo" aria-label="Delete photo">✕</button>
      `;
      div.addEventListener('click', (e) => {
        if (e.target.closest('.admin-delete')) return;
        openLightbox(i);
      });
      gallery.appendChild(div);
    });

    // Upload tile (shown only when is-admin)
    const upload = document.createElement('div');
    upload.className = 'photo photo-upload admin-only';
    upload.innerHTML = `
      <input type="file" id="uploadInput" multiple accept="image/*" />
      <label for="uploadInput">
        <span class="plus">+</span>
        <span class="lbl">Add Photos</span>
      </label>
    `;
    gallery.appendChild(upload);

    // Wire delete buttons
    gallery.querySelectorAll('.admin-delete').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!Admin.isLoggedIn()) return;
        const idx = parseInt(btn.dataset.idx, 10);
        if (confirm('Delete this photo?')) {
          Admin.removePhoto(id, idx);
          renderGallery();
        }
      });
    });

    // Wire upload
    const input = gallery.querySelector('#uploadInput');
    if (input) {
      input.addEventListener('change', async (e) => {
        const files = Array.from(e.target.files || []);
        if (!files.length) return;
        try {
          for (const file of files) {
            const dataUrl = await Admin.compressImage(file);
            const name = file.name.replace(/\.[^.]+$/, '');
            Admin.addPhoto(id, dataUrl, name);
          }
          renderGallery();
        } catch (err) {
          alert('Upload failed: ' + (err && err.message ? err.message : err) +
                '\n(Storage quota may be exceeded — try fewer or smaller photos.)');
        }
        e.target.value = '';
      });
    }

    observeFades();
  }

  // ——————————————— fade-in ———————————————
  let io = null;
  function observeFades() {
    if (!io) {
      io = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            e.target.classList.add('in');
            io.unobserve(e.target);
          }
        });
      }, { threshold: 0.08 });
    }
    document.querySelectorAll('.fade-up:not(.in)').forEach(el => io.observe(el));
  }

  // Reset album photos
  document.getElementById('resetBtn').addEventListener('click', () => {
    if (confirm(`Reset "${album.title}" photos to default?\nYour uploaded photos will be removed. (Cover image kept.)`)) {
      // Keep cover, clear photos override
      const cover = Admin.getAlbumCover(id);
      Admin.resetAlbum(id);
      if (cover) Admin.setAlbumCover(id, cover);
      renderGallery();
    }
  });

  // ——————————————— COVER MANAGEMENT ———————————————
  const CARD_RATIO = 220 / 310;
  const OUT_W = 440, OUT_H = 620;

  function refreshCover() {
    const cover = Admin.getAlbumCover(id);
    const preview = document.getElementById('coverPreview');
    const state = document.getElementById('coverState');
    const clearBtn = document.getElementById('coverClearBtn');
    if (cover) {
      preview.style.backgroundImage = `url(${cover})`;
      preview.classList.remove('empty');
      state.textContent = 'Custom';
      clearBtn.disabled = false;
    } else {
      preview.style.backgroundImage = 'none';
      preview.classList.add('empty');
      state.textContent = 'Default';
      clearBtn.disabled = true;
    }
  }

  function loadImage(src) {
    return new Promise((res, rej) => {
      const img = new Image();
      img.onload = () => res(img);
      img.onerror = rej;
      img.src = src;
    });
  }

  function fileToDataUrl(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result);
      r.onerror = rej;
      r.readAsDataURL(file);
    });
  }

  function renderCover(img, sx, sy, sw, sh) {
    const canvas = document.createElement('canvas');
    canvas.width = OUT_W;
    canvas.height = OUT_H;
    canvas.getContext('2d').drawImage(img, sx, sy, sw, sh, 0, 0, OUT_W, OUT_H);
    return canvas.toDataURL('image/jpeg', 0.88);
  }

  function openCropModal(img, rect) {
    return new Promise((resolve) => {
      const modal = document.getElementById('coverModal');
      const stageImg = modal.querySelector('.stage-img');
      const cropBox = modal.querySelector('.crop-box');
      const confirmBtn = document.getElementById('coverConfirm');
      const cancelBtn = document.getElementById('coverCancel');

      modal.hidden = false;
      stageImg.src = img.src;

      const onLoaded = () => {
        const imgRect = stageImg.getBoundingClientRect();
        const scale = imgRect.width / img.naturalWidth;
        const maxX = img.naturalWidth - rect.w;
        const maxY = img.naturalHeight - rect.h;

        const updateBox = () => {
          cropBox.style.left = (rect.x * scale) + 'px';
          cropBox.style.top = (rect.y * scale) + 'px';
          cropBox.style.width = (rect.w * scale) + 'px';
          cropBox.style.height = (rect.h * scale) + 'px';
        };
        updateBox();

        let startRX = 0, startRY = 0;
        let dragStartX = 0, dragStartY = 0;
        let dragging = false;

        cropBox.onpointerdown = (e) => {
          dragging = true;
          dragStartX = e.clientX;
          dragStartY = e.clientY;
          startRX = rect.x;
          startRY = rect.y;
          cropBox.setPointerCapture(e.pointerId);
          e.preventDefault();
        };
        cropBox.onpointermove = (e) => {
          if (!dragging) return;
          const dx = (e.clientX - dragStartX) / scale;
          const dy = (e.clientY - dragStartY) / scale;
          rect.x = Math.max(0, Math.min(maxX, startRX + dx));
          rect.y = Math.max(0, Math.min(maxY, startRY + dy));
          updateBox();
        };
        cropBox.onpointerup = () => { dragging = false; };
        cropBox.onpointercancel = () => { dragging = false; };
      };

      if (stageImg.complete && stageImg.naturalWidth > 0) onLoaded();
      else stageImg.onload = onLoaded;

      const cleanup = () => {
        modal.hidden = true;
        stageImg.onload = null;
        cropBox.onpointerdown = null;
        cropBox.onpointermove = null;
        cropBox.onpointerup = null;
        cropBox.onpointercancel = null;
        confirmBtn.onclick = null;
        cancelBtn.onclick = null;
      };
      confirmBtn.onclick = () => { cleanup(); resolve({ x: rect.x, y: rect.y, w: rect.w, h: rect.h }); };
      cancelBtn.onclick  = () => { cleanup(); resolve(null); };
    });
  }

  async function handleCoverFile(file) {
    try {
      const dataUrl = await fileToDataUrl(file);
      const img = await loadImage(dataUrl);
      const iW = img.naturalWidth, iH = img.naturalHeight;
      const imgRatio = iW / iH;

      let cropW, cropH;
      if (imgRatio > CARD_RATIO) { cropH = iH; cropW = Math.round(iH * CARD_RATIO); }
      else                        { cropW = iW; cropH = Math.round(iW / CARD_RATIO); }

      // Warn if image is smaller than output resolution
      if (cropW < OUT_W) {
        if (!confirm(`This image is smaller than the target cover size (${OUT_W}×${OUT_H}). Quality may suffer. Continue?`)) return;
      }

      // If already matches card aspect, skip the modal
      if (Math.abs(imgRatio - CARD_RATIO) < 0.01) {
        const out = renderCover(img, 0, 0, iW, iH);
        Admin.setAlbumCover(id, out);
        refreshCover();
        return;
      }

      const initialRect = {
        x: Math.floor((iW - cropW) / 2),
        y: Math.floor((iH - cropH) / 2),
        w: cropW,
        h: cropH,
      };
      const picked = await openCropModal(img, initialRect);
      if (!picked) return;

      const out = renderCover(img, picked.x, picked.y, picked.w, picked.h);
      Admin.setAlbumCover(id, out);
      refreshCover();
    } catch (err) {
      alert('Cover update failed: ' + (err && err.message ? err.message : err));
    }
  }

  document.getElementById('coverBtn').addEventListener('click', () => {
    document.getElementById('coverInput').click();
  });
  document.getElementById('coverInput').addEventListener('change', async (e) => {
    const file = e.target.files && e.target.files[0];
    e.target.value = '';
    if (file) await handleCoverFile(file);
  });
  document.getElementById('coverClearBtn').addEventListener('click', () => {
    if (confirm('Remove custom cover and use the default card image?')) {
      Admin.clearAlbumCover(id);
      refreshCover();
    }
  });

  refreshCover();
  renderGallery();
  observeFades();

  // ——————————————— LIGHTBOX ———————————————
  const lightbox = document.getElementById('lightbox');
  const lbImg = document.getElementById('lbImg');
  const lbCap = document.getElementById('lbCaption');
  const lbCnt = document.getElementById('lbCounter');
  const lbClose = document.getElementById('lbClose');
  const lbPrev  = document.getElementById('lbPrev');
  const lbNext  = document.getElementById('lbNext');
  let lbIdx = -1;
  let lastFocus = null;

  function currentPhotos() { return Admin.getAlbumPhotos(id); }

  function showLightbox(i) {
    const photos = currentPhotos();
    if (!photos.length) return;
    lbIdx = ((i % photos.length) + photos.length) % photos.length;
    const [src, caption] = photos[lbIdx];
    lbImg.src = src;
    lbImg.alt = caption || album.title || '';
    lbCap.textContent = caption || '';
    lbCnt.textContent = `${String(lbIdx + 1).padStart(2, '0')} / ${String(photos.length).padStart(2, '0')}`;
  }
  function openLightbox(i) {
    lastFocus = document.activeElement;
    lightbox.hidden = false;
    requestAnimationFrame(() => lightbox.classList.add('open'));
    document.body.style.overflow = 'hidden';
    showLightbox(i);
    lbClose.focus();
  }
  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
    setTimeout(() => { lightbox.hidden = true; }, 300);
    if (lastFocus && lastFocus.focus) lastFocus.focus();
    lbIdx = -1;
  }

  lbClose.addEventListener('click', closeLightbox);
  lbPrev.addEventListener('click', () => showLightbox(lbIdx - 1));
  lbNext.addEventListener('click', () => showLightbox(lbIdx + 1));
  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) closeLightbox();
  });

  document.addEventListener('keydown', (e) => {
    if (lbIdx >= 0) {
      if (e.key === 'Escape')      closeLightbox();
      else if (e.key === 'ArrowLeft')  showLightbox(lbIdx - 1);
      else if (e.key === 'ArrowRight') showLightbox(lbIdx + 1);
      return;
    }
    // Album-level navigation when lightbox closed and not in a field
    const t = e.target;
    if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA')) return;
    if (e.key === 'ArrowLeft')  window.location.href = `album.html?id=${prev}`;
    else if (e.key === 'ArrowRight') window.location.href = `album.html?id=${next}`;
    else if (e.key === 'Escape') window.location.href = 'index.html';
  });

  // Update OG meta with this album's cover
  const ogImg = (album.photos && album.photos[0] && album.photos[0][0]) || '';
  const ogDesc = album.description || 'A chapter from Lumière Archive.';
  function setMeta(selector, value) {
    const el = document.querySelector(selector);
    if (el) el.setAttribute('content', value);
  }
  setMeta('meta[property="og:title"]', `${album.title} — Lumière Archive`);
  setMeta('meta[property="og:description"]', ogDesc);
  setMeta('meta[name="description"]', ogDesc);
  setMeta('meta[name="twitter:title"]', `${album.title} — Lumière Archive`);
  setMeta('meta[name="twitter:description"]', ogDesc);
  if (ogImg) {
    let ogImgEl = document.querySelector('meta[property="og:image"]');
    if (!ogImgEl) {
      ogImgEl = document.createElement('meta');
      ogImgEl.setAttribute('property', 'og:image');
      document.head.appendChild(ogImgEl);
    }
    ogImgEl.setAttribute('content', ogImg);

    let twImgEl = document.querySelector('meta[name="twitter:image"]');
    if (!twImgEl) {
      twImgEl = document.createElement('meta');
      twImgEl.setAttribute('name', 'twitter:image');
      document.head.appendChild(twImgEl);
    }
    twImgEl.setAttribute('content', ogImg);
  }
</script>

</body>
