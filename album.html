<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Album — Lumière Archive</title>
<meta name="description" content="A chapter from Lumière Archive." />
<meta name="theme-color" content="#0a0a0a" />
<meta property="og:type" content="article" />
<meta property="og:title" content="Lumière Archive" />
<meta property="og:description" content="A chapter from Lumière Archive." />
<meta name="twitter:card" content="summary_large_image" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a0a;
    --bg-soft: #121212;
    --fg: #e8e4dc;
    --fg-muted: #7a7468;
    --fg-dim: #3a3632;
    --accent: #b29267;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Inter', system-ui, sans-serif;
    font-weight: 300;
    line-height: 1.6;
    overflow-x: hidden;
  }

  ::selection { background: var(--accent); color: var(--bg); }
  a { color: inherit; text-decoration: none; }

  .label {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--fg-muted);
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 32px 48px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    mix-blend-mode: difference;
  }
  nav .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--fg);
    transition: opacity 0.3s;
  }
  nav .brand:hover { opacity: 0.6; }
  nav .meta {
    text-align: right;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--fg);
    line-height: 1.8;
  }

  /* ADMIN BAR + LOGIN + TOAST (shared with index.html) */
  .admin-only { display: none !important; }
  body.is-admin .admin-only { display: inline-flex !important; }
  body.is-admin [data-editable] {
    cursor: text;
    transition: background 0.2s;
    border-radius: 2px;
  }
  body.is-admin [data-editable]:hover { background: rgba(178,146,103,0.06); }
  body.is-admin [data-editable][contenteditable="true"]:focus {
    outline: 1px dashed var(--accent);
    outline-offset: 6px;
    background: rgba(178,146,103,0.10);
  }
  .admin-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 200;
    padding: 10px 20px;
    background: rgba(178,146,103,0.95);
    color: #0a0a0a;
    display: none;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
  }
  body.is-admin .admin-bar { display: flex; }
  body.is-admin nav { top: 38px; }
  .admin-bar .ab-actions { display: flex; gap: 16px; align-items: center; }
  .admin-bar button {
    background: transparent;
    border: 1px solid #0a0a0a;
    color: #0a0a0a;
    padding: 6px 14px;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .admin-bar button:hover { background: #0a0a0a; color: var(--accent); }
  .admin-bar .save-status { opacity: 0.8; font-style: italic; text-transform: none; letter-spacing: 0.1em; }

  .login-modal {
    position: fixed; inset: 0; z-index: 3000;
    background: rgba(0,0,0,0.92);
    display: none;
    align-items: center; justify-content: center;
    padding: 20px;
  }
  .login-modal.open { display: flex; }
  .login-card {
    background: var(--bg-soft);
    border: 1px solid var(--fg-dim);
    padding: 48px;
    max-width: 380px; width: 100%;
  }
  .login-card h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px; font-weight: 300;
    margin-bottom: 32px;
    text-align: center;
  }
  .login-card input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--fg-dim);
    color: var(--fg);
    font-family: inherit;
    font-size: 14px;
    padding: 12px 0;
    outline: none;
    margin-bottom: 24px;
    letter-spacing: 0.15em;
  }
  .login-card input:focus { border-color: var(--accent); }
  .login-card .login-actions { display: flex; gap: 12px; }
  .login-card button {
    flex: 1;
    background: transparent;
    border: 1px solid var(--fg);
    color: var(--fg);
    padding: 14px 20px;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
  }
  .login-card button.primary { background: var(--fg); color: var(--bg); }
  .login-card button:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .login-card .err { color: #d97a7a; font-size: 11px; margin-top: -12px; margin-bottom: 16px; min-height: 14px; }

  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg-soft);
    border: 1px solid var(--fg-dim);
    color: var(--fg);
    padding: 14px 22px;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    z-index: 4000;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.err { border-color: #d97a7a; color: #d97a7a; }

  /* COVER */
  .cover-band {
    max-width: 1100px;
    margin: 0 auto;
    padding: 200px 80px 0;
    position: relative;
  }
  .cover-preview {
    aspect-ratio: 220 / 310;
    max-width: 280px;
    background: var(--bg-soft);
    overflow: hidden;
    position: relative;
  }
  .cover-preview img {
    width: 100%; height: 100%; object-fit: cover;
    display: block;
    filter: brightness(0.92);
  }

  /* HEADER */
  .album-header {
    padding: 60px 80px 120px;
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1.4fr;
    gap: 80px;
    align-items: end;
  }
  .album-header .chapter {
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--fg-muted);
    margin-bottom: 32px;
  }
  .album-header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 104px;
    line-height: 0.95;
    letter-spacing: -0.01em;
  }
  .album-header .desc {
    color: var(--fg-muted);
    font-size: 15px;
    line-height: 1.75;
    max-width: 440px;
  }

  /* GALLERY */
  .gallery {
    padding: 40px 80px 120px;
    max-width: 1400px;
    margin: 0 auto;
    columns: 3;
    column-gap: 24px;
  }
  .photo {
    position: relative;
    display: block;
    width: 100%;
    margin: 0 0 24px;
    break-inside: avoid;
    overflow: hidden;
    background: var(--bg-soft);
    cursor: zoom-in;
  }
  .photo img {
    width: 100%;
    height: auto;
    display: block;
    transition: transform 1.4s cubic-bezier(0.22, 1, 0.36, 1),
                filter 0.6s;
    filter: brightness(0.9);
  }
  .photo:hover img {
    transform: scale(1.03);
    filter: brightness(1);
  }
  .photo .caption {
    position: absolute;
    bottom: 20px; left: 20px;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--fg);
    opacity: 0;
    transition: opacity 0.4s;
  }
  .photo:hover .caption { opacity: 1; }
  .photo .photo-del {
    position: absolute;
    top: 12px; right: 12px;
    width: 32px; height: 32px;
    background: rgba(10,10,10,0.85);
    border: 1px solid rgba(255,255,255,0.2);
    color: var(--fg);
    cursor: pointer;
    z-index: 5;
    display: none;
    align-items: center; justify-content: center;
    font-size: 13px;
    transition: all 0.2s;
  }
  body.is-admin .photo .photo-del { display: flex; }
  .photo .photo-del:hover { background: var(--accent); border-color: var(--accent); color: #0a0a0a; }

  .photo-upload {
    background: var(--bg-soft);
    border: 1px dashed var(--fg-dim);
    cursor: pointer;
    transition: border-color 0.3s;
    min-height: 320px;
    display: none;
    align-items: center; justify-content: center;
    flex-direction: column;
    gap: 10px;
  }
  body.is-admin .photo-upload { display: flex; }
  .photo-upload:hover { border-color: var(--fg); }
  .photo-upload .plus {
    font-family: 'Cormorant Garamond', serif;
    font-size: 56px;
    font-weight: 300;
    color: var(--fg-muted);
    line-height: 1;
  }
  .photo-upload .lbl {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--fg-muted);
  }

  .replace-cover-btn {
    margin-top: 16px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 10px 18px;
    font-family: inherit;
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .replace-cover-btn:hover { background: var(--accent); color: #0a0a0a; }

  @media (max-width: 1100px) { .gallery { columns: 2; } }
  @media (max-width: 650px)  { .gallery { columns: 1; } }

  /* FOOTER NAV */
  .album-footer {
    border-top: 1px solid var(--fg-dim);
    padding: 60px 80px;
    max-width: 1400px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    align-items: center;
    gap: 24px;
  }
  .album-footer a {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--fg-muted);
    transition: color 0.3s;
  }
  .album-footer a:hover { color: var(--fg); }
  .album-footer .prev { justify-self: start; }
  .album-footer .home {
    justify-self: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    letter-spacing: 0.2em;
  }
  .album-footer .next { justify-self: end; }
  .album-footer .dir {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
  }
  .album-footer .sub {
    display: block;
    font-size: 9px;
    color: var(--fg-dim);
    margin-top: 4px;
  }
  .album-footer .peek { display: flex; flex-direction: column; }

  footer.site {
    border-top: 1px solid var(--fg-dim);
    padding: 40px 80px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--fg-muted);
  }
  footer.site a {
    color: var(--fg-muted);
    margin-left: 32px;
    transition: color 0.3s;
  }
  footer.site a:hover { color: var(--fg); }

  /* IMAGE BROKEN FALLBACK */
  .photo.img-broken, .cover-preview.img-broken {
    aspect-ratio: 4/3;
    position: relative;
  }
  .photo.img-broken::after, .cover-preview.img-broken::after {
    content: '—';
    position: absolute;
    inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--fg-dim);
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
  }

  /* fade-up entrance */
  .fade-up { opacity: 0; transform: translateY(24px); transition: opacity 1s ease, transform 1s ease; }
  .fade-up.in { opacity: 1; transform: translateY(0); }

  /* ACCESSIBILITY */
  *:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }

  /* LIGHTBOX */
  .lightbox {
    position: fixed; inset: 0;
    z-index: 2000;
    background: rgba(0,0,0,0.97);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; visibility: hidden;
    transition: opacity 0.3s ease;
  }
  .lightbox.open { opacity: 1; visibility: visible; }
  .lightbox-img {
    max-width: 92vw; max-height: 88vh;
    object-fit: contain;
    user-select: none;
    -webkit-user-drag: none;
    box-shadow: 0 30px 80px -20px rgba(0,0,0,0.9);
  }
  .lightbox-caption {
    position: absolute; bottom: 28px;
    left: 50%; transform: translateX(-50%);
    font-size: 11px; letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--fg-muted);
    text-align: center;
  }
  .lightbox-counter {
    position: absolute; top: 28px; left: 32px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px; letter-spacing: 0.2em;
    color: var(--fg-muted);
  }
  .lightbox-btn {
    position: absolute;
    background: transparent;
    border: 1px solid var(--fg-dim);
    color: var(--fg);
    width: 48px; height: 48px;
    cursor: pointer;
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.3s, background 0.3s;
  }
  .lightbox-btn:hover { border-color: var(--fg); background: rgba(255,255,255,0.05); }
  .lightbox-close { top: 24px; right: 24px; }
  .lightbox-prev  { left: 24px; top: 50%; transform: translateY(-50%); }
  .lightbox-next  { right: 24px; top: 50%; transform: translateY(-50%); }

  @media (max-width: 700px) {
    .lightbox-prev, .lightbox-next { width: 40px; height: 40px; }
    .lightbox-prev { left: 12px; }
    .lightbox-next { right: 12px; }
    .lightbox-close { top: 16px; right: 16px; }
    .lightbox-counter { top: 18px; left: 18px; font-size: 12px; }
  }

  @media (max-width: 900px) {
    nav { padding: 20px 24px; }
    .cover-band { padding: 140px 24px 0; }
    .album-header { padding: 40px 24px 60px; grid-template-columns: 1fr; gap: 24px; }
    .album-header h1 { font-size: 56px; }
    .gallery { padding: 20px 24px 80px; }
    .album-footer { padding: 40px 24px; grid-template-columns: 1fr; text-align: center; }
    .album-footer .prev, .album-footer .home, .album-footer .next { justify-self: center; }
    footer.site { flex-direction: column; gap: 16px; padding: 24px; }
  }
</style>
</head>
<body>

<div class="admin-bar" id="adminBar">
  <span>Admin Mode</span>
  <div class="ab-actions">
    <span class="save-status" id="saveStatus"></span>
    <button id="saveAllBtn" type="button">Save changes</button>
    <button id="logoutBtn" type="button">Log out</button>
  </div>
</div>

<div class="login-modal" id="loginModal" role="dialog" aria-modal="true" aria-label="Admin login">
  <div class="login-card">
    <h3>Admin</h3>
    <input id="loginPw" type="password" placeholder="Password" autocomplete="current-password" />
    <div class="err" id="loginErr"></div>
    <div class="login-actions">
      <button type="button" id="loginCancel">Cancel</button>
      <button type="button" id="loginSubmit" class="primary">Sign In</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<nav>
  <a href="index.html" class="brand">Lumière Archive</a>
  <div class="meta">
    Album <span id="navIdx">01</span> / <span id="navTotal">09</span><br />
    <span id="navChapter">—</span>
  </div>
</nav>

<section class="cover-band">
  <div class="cover-preview" id="coverPreview">
    <img id="coverImg" src="" alt="Cover" loading="eager"
         onerror="this.style.display='none';this.parentElement.classList.add('img-broken')" />
  </div>
  <button type="button" class="replace-cover-btn admin-only" data-edit="album-cover" data-album-id="0">Replace cover</button>
</section>

<header class="album-header fade-up">
  <div>
    <div class="chapter" id="chapterLabel" data-editable="album-chapter">—</div>
    <h1 id="albumTitle" data-editable="album-title">—</h1>
  </div>
  <p class="desc" id="albumDesc" data-editable="album-desc">—</p>
</header>

<section class="gallery" id="gallery"></section>

<div class="album-footer">
  <a id="prevLink" class="prev">
    <span class="dir">←</span>
    <span class="peek"><span>Previous</span><span class="sub" id="prevTitle">—</span></span>
  </a>
  <a href="index.html" class="home">Return to Archive</a>
  <a id="nextLink" class="next">
    <span class="peek"><span>Next</span><span class="sub" id="nextTitle">—</span></span>
    <span class="dir">→</span>
  </a>
</div>

<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer" hidden>
  <button class="lightbox-btn lightbox-close" id="lbClose" aria-label="Close (Esc)">✕</button>
  <button class="lightbox-btn lightbox-prev"  id="lbPrev"  aria-label="Previous (←)">‹</button>
  <button class="lightbox-btn lightbox-next"  id="lbNext"  aria-label="Next (→)">›</button>
  <span class="lightbox-counter" id="lbCounter"></span>
  <img class="lightbox-img" id="lbImg" alt="" />
  <div class="lightbox-caption" id="lbCaption"></div>
</div>

<footer class="site">
  <div>© MMXXVI — Lumière Archive · <a href="#" id="adminTrigger" style="color:var(--fg-dim);text-decoration:none;cursor:default" aria-label="Admin">·</a></div>
  <div>
    <a id="footerInsta" href="https://instagram.com/" target="_blank" rel="noopener" aria-label="Instagram">Instagram</a>
    <a id="footerEmail" href="mailto:abcysl@gmail.com" aria-label="Email">Email</a>
  </div>
</footer>

<script src="admin.js"></script>
<script>
  let CONTENT = null;
  let id = 0;
  const params = new URLSearchParams(location.search);

  const gallery = document.getElementById('gallery');
  const coverImg = document.getElementById('coverImg');
  const coverPreview = document.getElementById('coverPreview');
  const titleEl = document.getElementById('albumTitle');
  const descEl  = document.getElementById('albumDesc');
  const chEl    = document.getElementById('chapterLabel');
  const navIdx  = document.getElementById('navIdx');
  const navTot  = document.getElementById('navTotal');
  const navCh   = document.getElementById('navChapter');
  const prevLink = document.getElementById('prevLink');
  const nextLink = document.getElementById('nextLink');
  const prevTitle = document.getElementById('prevTitle');
  const nextTitle = document.getElementById('nextTitle');
  const replaceCoverBtn = document.querySelector('[data-edit="album-cover"]');
  const footerInsta = document.getElementById('footerInsta');
  const footerEmail = document.getElementById('footerEmail');

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }

  function renderAll(content) {
    CONTENT = content;
    const albums = content.albums || [];
    const total = albums.length;
    let parsed = parseInt(params.get('id') || '0', 10);
    if (isNaN(parsed) || parsed < 0 || parsed >= total) parsed = 0;
    id = parsed;
    window.__ALBUM_ID = id;

    const album = albums[id];
    const prev = (id - 1 + total) % total;
    const next = (id + 1) % total;
    const pad = (n) => String(n + 1).padStart(2, '0');

    coverImg.src = album.cover || (album.photos[0] && album.photos[0].url) || '';
    coverImg.alt = `${album.title} — cover`;
    coverPreview.classList.remove('img-broken');
    if (replaceCoverBtn) replaceCoverBtn.dataset.albumId = String(id);

    titleEl.textContent = album.title;
    descEl.textContent  = album.description || '';
    chEl.textContent    = album.chapter || '';
    navIdx.textContent  = pad(id);
    navTot.textContent  = String(total).padStart(2, '0');
    navCh.textContent   = album.chapter || '';
    document.title = `${album.title} — Lumière Archive`;

    prevLink.href = `album.html?id=${prev}`;
    nextLink.href = `album.html?id=${next}`;
    prevTitle.textContent = albums[prev].title;
    nextTitle.textContent = albums[next].title;

    if (content.profile) {
      if (content.profile.instagram) footerInsta.href = content.profile.instagram;
      if (content.profile.email)     footerEmail.href = `mailto:${content.profile.email}`;
    }

    renderGallery(album);
    setMeta('meta[property="og:title"]', `${album.title} — Lumière Archive`);
    setMeta('meta[property="og:description"]', album.description || 'A chapter from Lumière Archive.');
    setMeta('meta[name="description"]',       album.description || 'A chapter from Lumière Archive.');
    setOgImage(album.cover || (album.photos[0] && album.photos[0].url) || '');

    if (window.Admin) Admin.applyEditableState();
  }

  function setMeta(sel, val) {
    const el = document.querySelector(sel);
    if (el) el.setAttribute('content', val);
  }
  function setOgImage(url) {
    if (!url) return;
    let el = document.querySelector('meta[property="og:image"]');
    if (!el) { el = document.createElement('meta'); el.setAttribute('property', 'og:image'); document.head.appendChild(el); }
    el.setAttribute('content', url);
    let t = document.querySelector('meta[name="twitter:image"]');
    if (!t) { t = document.createElement('meta'); t.setAttribute('name', 'twitter:image'); document.head.appendChild(t); }
    t.setAttribute('content', url);
  }

  function renderGallery(album) {
    gallery.innerHTML = '';
    (album.photos || []).forEach((photo, i) => {
      const div = document.createElement('div');
      div.className = 'photo fade-up';
      div.dataset.idx = String(i);
      const cap = (photo.caption || album.title || '').replace(/"/g, '&quot;');
      div.innerHTML = `
        <img src="${escapeHtml(photo.url)}" alt="${cap}" loading="lazy" decoding="async"
             onerror="this.style.display='none';this.parentElement.classList.add('img-broken')" />
        <span class="caption">${escapeHtml(photo.caption || '')}</span>
        <button class="photo-del" type="button" data-del-photo="${i}" data-album-id="${id}" aria-label="Delete photo">✕</button>
      `;
      div.addEventListener('click', (e) => {
        if (e.target.closest('.photo-del')) return;
        openLightbox(i);
      });
      gallery.appendChild(div);
    });

    const upload = document.createElement('div');
    upload.className = 'photo-upload';
    upload.dataset.addPhotos = String(id);
    upload.innerHTML = `<span class="plus">+</span><span class="lbl">Add Photos</span>`;
    gallery.appendChild(upload);

    observeFades();
  }

  let io = null;
  function observeFades() {
    if (!io) {
      io = new IntersectionObserver((entries) => {
        entries.forEach((e) => {
          if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }
        });
      }, { threshold: 0.08 });
    }
    document.querySelectorAll('.fade-up:not(.in)').forEach((el) => io.observe(el));
  }

  // ——————————————— LIGHTBOX ———————————————
  const lightbox = document.getElementById('lightbox');
  const lbImg  = document.getElementById('lbImg');
  const lbCap  = document.getElementById('lbCaption');
  const lbCnt  = document.getElementById('lbCounter');
  const lbClose = document.getElementById('lbClose');
  const lbPrev  = document.getElementById('lbPrev');
  const lbNext  = document.getElementById('lbNext');
  let lbIdx = -1;
  let lastFocus = null;

  function currentPhotos() {
    if (!CONTENT) return [];
    const a = CONTENT.albums[id];
    return (a && a.photos) || [];
  }

  function showLightbox(i) {
    const photos = currentPhotos();
    if (!photos.length) return;
    lbIdx = ((i % photos.length) + photos.length) % photos.length;
    const p = photos[lbIdx];
    lbImg.src = p.url;
    lbImg.alt = p.caption || '';
    lbCap.textContent = p.caption || '';
    lbCnt.textContent = `${String(lbIdx + 1).padStart(2,'0')} / ${String(photos.length).padStart(2,'0')}`;
  }
  function openLightbox(i) {
    lastFocus = document.activeElement;
    lightbox.hidden = false;
    requestAnimationFrame(() => lightbox.classList.add('open'));
    document.body.style.overflow = 'hidden';
    showLightbox(i);
    lbClose.focus();
  }
  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
    setTimeout(() => { lightbox.hidden = true; }, 300);
    if (lastFocus && lastFocus.focus) lastFocus.focus();
    lbIdx = -1;
  }
  lbClose.addEventListener('click', closeLightbox);
  lbPrev.addEventListener('click', () => showLightbox(lbIdx - 1));
  lbNext.addEventListener('click', () => showLightbox(lbIdx + 1));
  lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });

  document.addEventListener('keydown', (e) => {
    if (lbIdx >= 0) {
      if (e.key === 'Escape')      closeLightbox();
      else if (e.key === 'ArrowLeft')  showLightbox(lbIdx - 1);
      else if (e.key === 'ArrowRight') showLightbox(lbIdx + 1);
      return;
    }
    const t = e.target;
    if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
    if (CONTENT) {
      const total = CONTENT.albums.length;
      const prev = (id - 1 + total) % total;
      const next = (id + 1) % total;
      if (e.key === 'ArrowLeft')  window.location.href = `album.html?id=${prev}`;
      else if (e.key === 'ArrowRight') window.location.href = `album.html?id=${next}`;
      else if (e.key === 'Escape') window.location.href = 'index.html';
    }
  });

  // ——————————————— BOOT ———————————————
  Admin.init({
    onContentChange: (next) => renderAll(next),
    getContent: () => CONTENT,
  });
  fetch('/api/content')
    .then((r) => r.json())
    .then(renderAll)
    .catch((err) => {
      console.error('content fetch failed', err);
      Admin.toast('Failed to load content. Refresh to retry.', true);
    });
</script>

</body>
</html>
